<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OBJECT 09 +</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f1f7;
  --text:#2a2230;
  --muted:#7a6f80;
  --accent:#d08aa8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at 20% 10%, #fff, #f4e8f5 40%, #efe3f1);
  color:var(--text);
  overflow:hidden;
}

body::before,
body::after{
  content:"";
  position:fixed;
  top:0;
  bottom:0;
  width:12vw;
  pointer-events:none;
  z-index:5;
}
body::before{
  left:0;
  background:linear-gradient(to right, #f6f1f7, transparent);
}
body::after{
  right:0;
  background:linear-gradient(to left, #f6f1f7, transparent);
}

#gate{
  position:fixed;
  inset:0;
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at 20% 10%, #fff, #f4e8f5 40%, #efe3f1);
}
.gate{
  text-align:center;
  width:360px;
}
.gate h1{
  letter-spacing:.6em;
  font-size:20px;
}
.gate p{
  font-size:10px;
  letter-spacing:.25em;
  color:var(--muted);
}
input{
  width:100%;
  padding:14px;
  border:none;
  border-bottom:1px solid #ccc;
  text-align:center;
  background:transparent;
  outline:none;
}
button{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  background:transparent;
  cursor:pointer;
  letter-spacing:.3em;
}
button:hover{
  background:rgba(208,138,168,.15);
}
#error{
  font-size:10px;
  color:#b85f7d;
  opacity:0;
  margin-top:10px;
}

header{
  padding:40px 60px;
  font-size:11px;
  letter-spacing:.35em;
  color:var(--muted);
}

#wall{
  column-count:4;
  column-gap:28px;
  height:calc(100vh - 120px);
  overflow-y:auto;
  padding:20px 80px 100px;
}

@media(max-width:1100px){#wall{column-count:3;}}
@media(max-width:800px){#wall{column-count:2;}}
@media(max-width:500px){#wall{column-count:1;}}

.art{
  break-inside:avoid;
  margin-bottom:26px;
  cursor:pointer;
}

.art img{
  width:100%;
  display:block;
  border-radius:2px;
  box-shadow:0 10px 30px rgba(208,138,168,.12);
  transition:.3s;
}
.art img:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 50px rgba(208,138,168,.2);
}

#inspect{
  position:fixed;
  inset:0;
  display:none;
  z-index:100;
  background:radial-gradient(circle,#fff,#f4e8f5);
}

.wrap{
  display:flex;
  height:100%;
}

#viewer{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
}

#viewer img{
  max-width:70%;
  max-height:70vh;
  box-shadow:0 30px 80px rgba(208,138,168,.2);
}

#audioBox{
  width:60%;
}

#audioBox label{
  font-size:10px;
  letter-spacing:.3em;
  color:var(--muted);
}

audio{width:100%;margin-top:6px;}

#panel{
  width:340px;
  padding:30px;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(12px);
  border-left:1px solid #ddd;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.tab{
  font-size:10px;
  padding:8px;
  cursor:pointer;
  border:1px solid #ddd;
}
.tab.active{
  background:rgba(208,138,168,.15);
}

.meta{font-size:10px;color:var(--muted);margin-top:8px;}
.label{margin-top:18px;font-size:13px;}

.tag{
  display:inline-block;
  font-size:10px;
  padding:3px 6px;
  border:1px solid #ddd;
  margin:3px;
}

.link{
  display:block;
  font-size:10px;
  color:var(--muted);
  margin-top:6px;
  text-decoration:none;
}

.link:hover{color:var(--accent);}

</style>
</head>

<body>

<!-- PASSWORD -->
<div id="gate">
  <div class="gate">
    <h1>OBJECT 09</h1>
    <p>private exhibition archive</p>

    <input id="pass" type="password" placeholder="enter password"/>
    <button onclick="check()">ENTER</button>
    <div id="error">ACCESS DENIED</div>
  </div>
</div>

<header>OBJECT 09 // RELIC ARCHIVE</header>

<div id="wall"></div>

<div id="inspect">
<div class="wrap">

  <div id="viewer">
    <img id="img"/>
    <div id="audioBox">
      <label>MEMORY SOUND LAYER</label>
      <audio id="audio" controls></audio>
    </div>
  </div>

  <div id="panel">

    <div class="tabs">
      <div class="tab active" onclick="tab('archive')">ARCHIVE</div>
      <div class="tab" onclick="tab('identity')">IDENTITY</div>
    </div>

    <div id="archiveTab">
      <div class="label" id="label"></div>
      <div class="meta">TYPE: VISUAL FRAGMENT</div>
      <div class="meta">STATUS: PRESERVED</div>
    </div>

    <div id="identityTab" style="display:none;">
      <div id="artist"></div>
      <div id="tags"></div>
      <div id="links"></div>
      <div id="statement" class="meta"></div>
    </div>

    <button onclick="closeView()">RETURN</button>
  </div>

</div>
</div>

<script>

const PASSWORD = "andromeda";

function check(){
  if(document.getElementById("pass").value === PASSWORD){
    document.getElementById("gate").style.display="none";
  } else {
    document.getElementById("error").style.opacity=1;
  }
}

const data = [
{
 img:"https://axayacatl.neocities.org/images/artwork/digital/positive.PNG",
 artist:"Axayacatl",
 tags:["fairy,erotica"],
 links:[{t:"site",u:"https://axayacatl.neocities.org/"}],
 statement:"He is never on top and he is interchangable. Good times to be had."
},
  {
 img:"https://axayacatl.neocities.org/images/artwork/cuddlez.png",
 artist:"Axayacatl",
 tags:["memory","feminine archive","digital ruin"],
 links:[{t:"site",u:"https://axayacatl.neocities.org/"}],
 statement:"Snack time! Now Paimon is around and I have no idea."
},
{
 img:"https://axayacatl.neocities.org/images/artwork/gargoyle.png",
 artist:"Axayacatl,
 tags:["cyber","soft decay"],
 links:[{t:"site",u:"https://axayacatl.neocities.org/"}],
 statement:"The gargoyle is disturbed."
}
];

const wall=document.getElementById("wall");

data.forEach((d,i)=>{
  const div=document.createElement("div");
  div.className="art";
  div.innerHTML=`<img src="${d.img}"/>`;
  div.onclick=()=>open(i);
  wall.appendChild(div);
});

let current=0;

function open(i){
  current=i;
  const d=data[i];

  document.getElementById("inspect").style.display="block";
  document.getElementById("img").src=d.img;
  document.getElementById("audio").src=d.audio;
  document.getElementById("label").textContent="RELIC // "+(i+1);

  document.getElementById("artist").textContent=d.artist;

  document.getElementById("tags").innerHTML=
    d.tags.map(t=>`<span class="tag">${t}</span>`).join("");

  document.getElementById("links").innerHTML=
    d.links.map(l=>`<a class="link" href="${l.u}">${l.t}</a>`).join("");

  document.getElementById("statement").textContent=d.statement;

  tab("archive");
}

function closeView(){
  document.getElementById("inspect").style.display="none";
  document.getElementById("audio").pause();
}

function tab(t){
  document.getElementById("archiveTab").style.display =
    t==="archive"?"block":"none";

  document.getElementById("identityTab").style.display =
    t==="identity"?"block":"none";
}

</script>

</body>
</html>
