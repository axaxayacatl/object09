<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBJECT 09 +</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f1f7;
  --text:#2a2230;
  --muted:#7a6f80;
  --accent:#d08aa8;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:
    radial-gradient(circle at 20% 10%, #ffffff, #f4e8f5 40%, #efe3f1);
  color:var(--text);
  overflow:hidden;
}

/* PERIPHERAL FADE */
body::before,
body::after{
  content:"";
  position:fixed;
  top:0;
  bottom:0;
  width:14vw;
  pointer-events:none;
  z-index:5;
}

body::before{
  left:0;
  background:linear-gradient(to right,
    rgba(246,241,247,1),
    rgba(246,241,247,0));
}

body::after{
  right:0;
  background:linear-gradient(to left,
    rgba(246,241,247,1),
    rgba(246,241,247,0));
}

/* PASSWORD GATE */

#gate{
  position:fixed;
  inset:0;
  z-index:9999;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    radial-gradient(circle at 20% 10%,
    #ffffff,
    #f4e8f5 40%,
    #efe3f1);
}

.gate-panel{
  width:420px;
  text-align:center;
}

.gate-lines{
  font-size:12px;
  color:var(--muted);
  letter-spacing:.1em;
  margin:18px 0;
}

.gate-title{
  font-size:20px;
  letter-spacing:.7em;
  margin-bottom:18px;
}

.gate-subtitle{
  font-size:10px;
  letter-spacing:.3em;
  color:var(--muted);
  margin-bottom:30px;
  text-transform:uppercase;
}

#passwordInput{
  width:100%;
  padding:14px;

  border:none;
  border-bottom:1px solid rgba(0,0,0,.15);

  background:transparent;

  text-align:center;

  font-family:inherit;
  outline:none;
}

#gate button{
  margin-top:24px;
  width:100%;
}

#error{
  margin-top:20px;
  font-size:10px;
  letter-spacing:.25em;
  color:#b85f7d;
  opacity:0;
  transition:.3s;
}

/* HEADER */

header{
  padding:40px 60px 12px;
  font-size:11px;
  letter-spacing:.35em;
  color:var(--muted);
}


#wall{
  column-count:4;
  column-gap:32px;

  height:calc(100vh - 90px);

  overflow-y:auto;

  padding:
    20px
    clamp(40px,8vw,120px)
    120px;

  max-width:1800px;
  margin:0 auto;
}

@media(max-width:1200px){
  #wall{
    column-count:3;
  }
}

@media(max-width:900px){
  #wall{
    column-count:2;
  }
}

@media(max-width:600px){
  #wall{
    column-count:1;
  }
}

.art{
  break-inside:avoid;
  margin-bottom:30px;
  cursor:pointer;
}

.art img{
  width:100%;
  display:block;

  border-radius:2px;

  box-shadow:
    0 10px 30px rgba(208,138,168,.12);

  transition:
    transform .35s ease,
    box-shadow .35s ease,
    filter .35s ease;
}

.art:hover img{
  transform:translateY(-6px);

  box-shadow:
    0 20px 50px rgba(208,138,168,.22);
}



#inspect{
  position:fixed;
  inset:0;
  display:none;
  z-index:100;

  background:
    radial-gradient(circle at center,
    #ffffff,
    #f4e8f5);
}

.inspect-wrap{
  height:100%;
  display:flex;
}

#viewer{
  flex:1;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  gap:20px;
  padding:40px;
}

#viewer img{
  max-width:75%;
  max-height:70vh;

  box-shadow:
    0 25px 70px rgba(208,138,168,.18);
}

#audioBox{
  width:min(700px,70%);
}

#audioBox label{
  display:block;
  margin-bottom:8px;

  font-size:10px;
  letter-spacing:.3em;
  color:var(--muted);
}

audio{
  width:100%;
}

#panel{
  width:340px;

  padding:40px;

  background:
    rgba(255,255,255,.72);

  backdrop-filter:blur(16px);

  border-left:
    1px solid rgba(0,0,0,.08);
}

.archive-title{
  font-size:11px;
  letter-spacing:.35em;
  color:var(--muted);
}

.label{
  margin-top:24px;
  font-size:14px;
}

.meta{
  margin-top:10px;
  font-size:10px;
  letter-spacing:.18em;
  color:var(--muted);
}

button{
  padding:12px 16px;

  border:1px solid rgba(0,0,0,.12);
  background:transparent;

  font-size:10px;
  letter-spacing:.25em;

  cursor:pointer;
}

button:hover{
  background:rgba(208,138,168,.12);
}
</style>
</head>

<body>


<div id="gate">

  <div class="gate-panel">

    <div class="gate-lines">
      ────────────────────────────
    </div>

    <div class="gate-title">
      OBJECT 09
    </div>

    <div class="gate-subtitle">
      private exhibition archive
    </div>

    <input
      type="password"
      id="passwordInput"
      placeholder="enter password"
    >

    <button onclick="checkPassword()">
      ENTER
    </button>

    <div id="error">
      ACCESS DENIED
    </div>

    <div class="gate-lines">
      ────────────────────────────
    </div>

  </div>

</div>

<header>
OBJECT 09 // PERIPHERAL MEMORY ARCHIVE
</header>

<div id="wall"></div>

<div id="inspect">

  <div class="inspect-wrap">

    <div id="viewer">

      <img id="fullImg" alt="Artwork">

      <div id="audioBox">
        <label>MEMORY SOUND LAYER</label>
        <audio id="audio" controls></audio>
      </div>

    </div>

    <div id="panel">

      <div class="archive-title">
        ARCHIVAL NOTE
      </div>

      <div class="label" id="label"></div>

      <div class="meta">
        TYPE: EMOTIONAL VISUAL FRAGMENT
      </div>

      <div class="meta">
        ORIGIN: UNKNOWN MEMORY SYSTEM
      </div>

      <div class="meta">
        STATUS: PRESERVED
      </div>

      <button onclick="closeView()">
        RETURN
      </button>

    </div>

  </div>

</div>

<script>
const PASSWORD = "object09";

function checkPassword(){

  const entered =
    document.getElementById("passwordInput").value;

  if(entered === PASSWORD){

    document.getElementById("gate").style.display = "none";

  }else{

    document.getElementById("error").style.opacity = "1";

  }
}

document
.getElementById("passwordInput")
.addEventListener("keydown", e => {

  if(e.key === "Enter"){
    checkPassword();
  }

});

const data = [

{
  img:"https://picsum.photos/700/1000?random=1",
  audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},
{
  img:"https://picsum.photos/700/700?random=2",
  audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
},
{
  img:"https://picsum.photos/700/1200?random=3",
  audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
},
{
  img:"https://picsum.photos/700/850?random=4",
  audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
},
{
  img:"https://picsum.photos/700/500?random=5",
  audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"
},
{
  img:"https://picsum.photos/700/1100?random=6",
  audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3"
}
];

const wall = document.getElementById("wall");

data.forEach((item,index)=>{

  const card = document.createElement("div");
  card.className = "art";

  const img = document.createElement("img");
  img.src = item.img;

  card.appendChild(img);

  card.onclick = () => openView(item,index);

  wall.appendChild(card);

});

function openView(item,index){

  document.getElementById("inspect").style.display = "block";

  document.getElementById("fullImg").src = item.img;

  document.getElementById("label").textContent =
    "RELIC FRAGMENT // " +
    String(index + 1).padStart(2,"0");

  document.getElementById("audio").src =
    item.audio;
}

function closeView(){

  document.getElementById("inspect").style.display = "none";

  const audio =
    document.getElementById("audio");

  audio.pause();
  audio.currentTime = 0;
}
</script>

</body>
</html>
