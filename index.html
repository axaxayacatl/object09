<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OBJECT 09</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f5f1;
  --text:#111;
  --muted:#888;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Inter", sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

#login{
  text-align:left;
  width:320px;
}

.title{
  font-size:14px;
  letter-spacing:.2em;
  margin-bottom:40px;
}

.big{
  font-size:56px;
  font-weight:300;
  letter-spacing:.15em;
  text-transform:uppercase;
  margin:0 0 40px 0;
}

.sub{
  font-size:12px;
  letter-spacing:.1em;
  color:var(--muted);
  margin-bottom:10px;
}

input{
  width:100%;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--text);
  padding:10px 0;
  font-size:14px;
  outline:none;
  letter-spacing:.1em;
}

button{
  margin-top:20px;
  background:none;
  border:1px solid var(--text);
  padding:10px 14px;
  cursor:pointer;
  font-size:12px;
  letter-spacing:.2em;
}

button:hover{
  background:var(--text);
  color:var(--bg);
}

/* Gallery */
#gallery{
  display:none;
  width:100%;
  height:100vh;
}

.room{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

.room img{
  max-width:70vw;
  max-height:70vh;
  object-fit:contain;
  margin-bottom:20px;
}

.caption{
  font-size:12px;
  letter-spacing:.2em;
  text-transform:uppercase;
}

/* subtle fade */
.fade{
  animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div id="login" class="fade">

  <div class="title">[ O B J E C T   0 9 ]</div>

  <div class="big">PRIVATE<br>EXHIBITION</div>

  <div class="sub">for invited visitors only</div>

  <input id="password" type="password" placeholder="enter password"/>

  <button onclick="enter()">enter</button>

</div>

<div id="gallery">

  <div class="room fade">
    <img src="https://picsum.photos/1200/800?random=1">
    <div class="caption">memory fragment // 01</div>
  </div>

</div>

<script>
const PASS = "object09";

function enter(){
  const val = document.getElementById("password").value;

  if(val === PASS){
    document.getElementById("login").style.display="none";
    document.getElementById("gallery").style.display="block";
  } else {
    document.getElementById("password").style.borderBottom="1px solid red";
  }
}
</script>

</body>
</html>
